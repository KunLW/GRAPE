# Production configuration for the pulse-search experiment.
#
# Used by run_search.py for every gallery pulse; the initial pulse itself is
# injected per run (runtime.initial_pulse_npz is set programmatically), so it
# must not be set here. Same schema as experiments/spin_boson/configs/example.yaml.

system:
  type: spin_boson
  params:
    n_levels: 6
    phi_s: 0.0
    eta: 0.075
    mode_vector: [0.5, -0.5]
    target_gate: ms_xx_pi_over_2
    alpha1_khz_bounds: [1.0, 60.0]
    alpha2_khz_bounds: [0.0, 200.0]
  noise:
    decoherence:
      enabled: false
      gamma_heating: 0.0
      gamma_motional_dephasing: 0.0
      gamma_spin_dephasing: 0.0
    fluctuations:
      enabled: true
      sigma_static_spin_dephasing: 31.4159
      sigma_static_motional_frequency: 30.00
      sigma_control_alpha1_relative: 1.0e-4
      sigma_control_alpha2_relative: 1.0e-4

pulse:
  n_steps: 400
  total_time_us: 225.8
  random_seed: 12345            # reference pulse only; the gallery pulse overrides it

objective:
  max_order: 2
  drop_odd_average: true
  normalize_weights: false

optimizer:
  method: L-BFGS-B
  maxiter: 250
  gtol: 1.0e-10
  ftol: 1.0e-15
  maximize: true

penalty:
  l1_smooth_weight: 5.0e-4
  l2_smooth_weight: 1.0e-4

runtime:
  workers: 16                   # state-pair worker processes per run;
                                # match submit_slurm.sh --cpus-per-task
  print_step: false
  print_fidelity_terms: false
  no_progress: true

output:
  output_root: experiments/spin_boson/pulse_search/outputs
  prefix: pulse-search
