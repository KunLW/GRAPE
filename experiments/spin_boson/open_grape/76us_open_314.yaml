system:
  type: spin_boson
  params:
    n_levels: 6
    phi_s: 0.0
    eta: 0.075
    mode_vector:
    - 0.5
    - -0.5
    target_gate: ms_xx_pi_over_2
    alpha1_khz_bounds:
    - 1.0
    - 60.0
    alpha2_khz_bounds:
    - 0.0
    - 200.0
