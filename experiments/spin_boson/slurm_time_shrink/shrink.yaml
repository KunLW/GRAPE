# Production configuration for the slurm_time_shrink experiment.
#
# Same physics/noise/optimizer setup as pulse_search/search.yaml (the pulses
# being shrunk were optimized under it). Per-task values are injected by
# run_time_shrink.py: runtime.initial_pulse_npz (the copied final pulse) and,
# for the 300us/170us variants, pulse.total_time_us — so total_time_us below
# is the "orig" starting time and must not be edited per task.

system:
  type: spin_boson
  params:
    n_levels: 6
    phi_s: 0.0
    eta: 0.075
    mode_vector: [0.5, -0.5]
    target_gate: ms_xx_pi_over_2
    alpha1_khz_bounds: [1.0, 60.0]
    alpha2_khz_bounds: [0.0, 200.0]
  noise:
    decoherence:
      enabled: false
      gamma_heating: 0.0
      gamma_motional_dephasing: 0.0
      gamma_spin_dephasing: 0.0
    fluctuations:
      enabled: true
      sigma_static_spin_dephasing: 31.4159
      sigma_static_motional_frequency: 30.00
      sigma_control_alpha1_relative: 1.0e-4
      sigma_control_alpha2_relative: 1.0e-4

pulse:
  n_steps: 400                  # must match the _s<steps> of the copied pulses
  total_time_us: 225.8          # the "orig" start time (pulse_search gate time)
  random_seed: 12345            # reference pulse only; every task warm-starts

objective:
  max_order: 2
  drop_odd_average: true
  normalize_weights: false

optimizer:
  method: L-BFGS-B
  maxiter: 250
  gtol: 1.0e-10
  ftol: 1.0e-15
  maximize: true

penalty:
  l1_smooth_weight: 5.0e-4
  l2_smooth_weight: 1.0e-4

runtime:
  workers: 10                   # state-pair worker processes per round;
                                # match submit_slurm.sh -c
  print_step: false
  print_fidelity_terms: false
  no_progress: true

output:
  output_root: experiments/spin_boson/slurm_time_shrink/outputs
  prefix: time-shrink
